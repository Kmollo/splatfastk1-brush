# SplatfastK1 — Brush Gaussian-splat trainer for Replicate
# Builds a Linux container with the official Brush binary.
# Source: https://github.com/ArthurBrussee/brush/releases

build:
  gpu: true
  cuda: "12.1"
  python_version: "3.11"
  # NOTE: Brush uses Vulkan via wgpu, NOT CUDA. We need:
  #   - libvulkan1: the Vulkan loader
  #   - libnvidia-encode1 / mesa-vulkan-drivers: a Vulkan ICD ("driver") so
  #     the loader can actually find a GPU. On Replicate's NVIDIA-driver-
  #     equipped hosts, the nvidia_icd.json is installed via the host driver,
  #     but we also keep mesa-vulkan-drivers as a fallback ICD.
  system_packages:
    - "wget"
    - "ca-certificates"
    - "xz-utils"
    - "libgl1"
    - "libglib2.0-0"
    - "libvulkan1"
    - "vulkan-tools"
    - "mesa-vulkan-drivers"
    - "libegl1"
  python_packages:
    - "numpy==1.26.4"

  # Pin to a specific Brush release for reproducibility. Each list item is one
  # Docker RUN layer; we chain everything with && so it's a single layer that
  # cleans up its download artifact.
  run:
    # Download Brush v0.3.0 Linux binary
    - "mkdir -p /opt/brush && cd /opt/brush && wget -q https://github.com/ArthurBrussee/brush/releases/download/v0.3.0/brush-app-x86_64-unknown-linux-gnu.tar.xz && tar xJf brush-app-x86_64-unknown-linux-gnu.tar.xz --strip-components=1 && rm brush-app-x86_64-unknown-linux-gnu.tar.xz && chmod +x /opt/brush/brush_app && ls -la /opt/brush"
    # Install an NVIDIA Vulkan ICD manifest. nvidia-container-toolkit mounts
    # libGLX_nvidia.so at runtime; this manifest tells the Vulkan loader to
    # use it. Without this, wgpu/Brush can't find the GPU and hangs.
    - "mkdir -p /usr/share/vulkan/icd.d && printf '%s\\n' '{' '    \"file_format_version\": \"1.0.0\",' '    \"ICD\": {' '        \"library_path\": \"libGLX_nvidia.so.0\",' '        \"api_version\": \"1.3.0\"' '    }' '}' > /usr/share/vulkan/icd.d/nvidia_icd.json && cat /usr/share/vulkan/icd.d/nvidia_icd.json"

predict: "predict.py:Predictor"

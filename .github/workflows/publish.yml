name: Publish Brush model to Replicate

# Run on every push to main, or manually from the Actions tab
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "cog.yaml"
      - "predict.py"
      - ".github/workflows/publish.yml"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space on the runner
        # Replicate / cog builds pull a big CUDA base image (~5 GB).
        # GitHub's default Ubuntu runner is tight on disk by default.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Install cog
        run: |
          sudo curl -o /usr/local/bin/cog -L "https://github.com/replicate/cog/releases/latest/download/cog_$(uname -s)_$(uname -m)"
          sudo chmod +x /usr/local/bin/cog
          cog --version

      - name: Log in to Replicate
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          if [ -z "$REPLICATE_API_TOKEN" ]; then
            echo "::error::REPLICATE_API_TOKEN secret is not set. Add it under Settings > Secrets > Actions."
            exit 1
          fi
          echo "$REPLICATE_API_TOKEN" | cog login --token-stdin

      - name: Build and push model
        env:
          # Target model — fixed to your Replicate username
          REPLICATE_MODEL: "kmollo/splatfastk1-brush"
        run: |
          echo "Publishing to r8.im/$REPLICATE_MODEL"
          cog push "r8.im/$REPLICATE_MODEL"
